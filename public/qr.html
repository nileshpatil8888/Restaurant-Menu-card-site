<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scan to open your restaurant menu</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      .card {
        text-align: center;
        padding: 24px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        max-width: 380px;
      }
      .card h1 {
        font-size: 1.35rem;
        margin-bottom: 16px;
      }
      .card p {
        margin: 12px 0 20px;
        color: #4b5563;
      }
      .link {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 18px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 600;
      }
      .small {
        font-size: 0.94rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Scan to open your digital menu</h1>
      <img alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://restaurant-menu-card-site.vercel.app/" width="300" height="300" />
      <p>Open this menu on any phone by scanning the QR code.</p>
      <a class="link" href="https://restaurant-menu-card-site.vercel.app/">Open menu</a>
      <p class="small">Use this page to print or display a QR code at your restaurant.</p>
    </div>
  </body>
</html>
